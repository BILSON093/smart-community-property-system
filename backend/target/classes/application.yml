server:
  port: 8080
  servlet:
    context-path: /api
  url: http://localhost:8080

spring:
  application:
    name: wuye-system
  
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wuye?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false
    username: root
    password: 12345678
  
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 40MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.wye.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 文件存储配置
file:
  upload:
    path: /Users/macbook/Desktop/ai/trae/elysia1/backend/upload
    url-prefix: /upload

# JWT配置
jwt:
  secret: wuye-system-secret-key-2024
  expiration: 86400000 # 24小时

# AI配置（本地AI接口）
ai:
  url: http://localhost:1234/v1/chat/completions
  model: local-model
